# nginx config for the RoofMeasure engine.
#
# Goals:
#   1. Terminate TLS (Let's Encrypt) at the edge.
#   2. Enforce an X-API-Key header before the request ever touches Python
#      (defense in depth - the Python engine also checks it).
#   3. Rate-limit per source IP so a leaked key can't be used to drain quota.
#   4. Long upstream timeouts because a LAZ download can take 30-60s.
#   5. Drop /health from the auth check so monitoring can ping it cleanly.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/lidar-worker.conf
#   sudo ln -s /etc/nginx/sites-available/lidar-worker.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace lidar-worker.canadasroofer.com with your real hostname and run:
#   sudo certbot --nginx -d lidar-worker.canadasroofer.com

# -------- Per-IP rate limit zone --------
# 10MB ~= 160k unique IPs. 30 req/min/IP is generous for a paid API but
# stops a leaked key from being used to spam.
limit_req_zone $binary_remote_addr zone=lidar_per_ip:10m rate=30r/m;

# -------- Map: which API keys are allowed --------
# Add one line per allowed key. Generate keys with:
#   python3 -c "import secrets; print(secrets.token_urlsafe(48))"
# Keep this file readable only by root.
#   sudo chmod 600 /etc/nginx/lidar_api_keys.map
map $http_x_api_key $lidar_key_ok {
    default                                       0;
    include                                       /etc/nginx/lidar_api_keys.map;
}

# -------- Redirect plain HTTP -> HTTPS --------
server {
    listen 80;
    listen [::]:80;
    server_name lidar-worker.canadasroofer.com;
    return 301 https://$host$request_uri;
}

# -------- The actual TLS server --------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lidar-worker.canadasroofer.com;

    # Certbot fills these in:
    ssl_certificate     /etc/letsencrypt/live/lidar-worker.canadasroofer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lidar-worker.canadasroofer.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # Hide nginx version
    server_tokens off;

    # Reasonable body size (an address is at most a few hundred bytes)
    client_max_body_size 16k;

    # Timeouts: a LAZ download + RANSAC pass can take ~60s
    proxy_connect_timeout 5s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    send_timeout 120s;

    # Default access log
    access_log /var/log/nginx/lidar-worker.access.log combined;
    error_log  /var/log/nginx/lidar-worker.error.log warn;

    # -------- /health: unauthenticated, used by monitoring/load balancers --------
    location = /health {
        proxy_pass http://127.0.0.1:8088/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # rate-limit /health too, just less aggressively
        limit_req zone=lidar_per_ip burst=20 nodelay;
    }

    # -------- /measure: requires X-API-Key --------
    location = /measure {
        # Step 1: check the API key map. If the header didn't match a known key,
        # return 401 here before we even talk to the upstream.
        if ($lidar_key_ok != 1) {
            return 401 '{"error":"invalid or missing X-API-Key"}';
        }

        # Step 2: rate-limit per IP. burst=10 lets occasional bursts through.
        limit_req zone=lidar_per_ip burst=10 nodelay;

        # Step 3: only allow JSON POST
        if ($request_method != POST) {
            return 405 '{"error":"method not allowed"}';
        }

        # Make sure we return JSON on errors
        default_type application/json;

        proxy_pass http://127.0.0.1:8088/measure;
        proxy_set_header Host $host;
        proxy_set_header Content-Type "application/json";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Pass the API key through so the Python engine can verify too
        # (defense in depth - if someone bypasses nginx, the engine still checks).
        proxy_set_header X-API-Key $http_x_api_key;
        proxy_pass_request_headers on;
    }

    # -------- everything else: 404 --------
    location / {
        default_type application/json;
        return 404 '{"error":"not found"}';
    }
}
