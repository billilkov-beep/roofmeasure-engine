# Drop this file into your Next.js repo at .github/workflows/e2e.yml
#
# Runs the Playwright suite against staging/production nightly and on PRs.
# Requires the following GitHub Secrets:
#   E2E_BASE_URL          - e.g. https://measure.canadasroofer.com
#   E2E_ADMIN_EMAIL       - admin login (use a dedicated test admin)
#   E2E_ADMIN_PASSWORD    - admin password
#   E2E_TEST_ADDRESS      - optional, defaults to 624 Merrill Ave, Bedford, OH
#   SLACK_WEBHOOK_URL     - optional, posts on failure

name: E2E tests
on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"     # 08:00 UTC daily (~04:00 ET, low-traffic window)
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "lib/**"
      - "components/**"
      - "tests/**"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: ./e2e-tests   # adjust if you put the tests elsewhere

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: e2e-tests/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL }}
          ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          TEST_ADDRESS: ${{ secrets.E2E_TEST_ADDRESS }}
          CI: "true"
        run: npx playwright test --reporter=list,html

      - name: Upload trace + HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e-tests/playwright-report/
            e2e-tests/test-results/
          retention-days: 14

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\":x: E2E suite failed on ${GITHUB_REF_NAME}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
